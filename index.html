<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>工事写真 管理アプリ</title>
  <link rel="stylesheet" href="lib/leaflet.css">
  <link rel="stylesheet" href="css/styles.css?v=20260703a">
</head>
<body>
  <header class="appbar">
    <div class="appbar-title">工事写真 管理</div>
    <button class="appbar-toggle" id="btnHeaderToggle" title="メニューの表示／非表示" aria-expanded="true">△</button>
    <div class="appbar-project">
      工事：<span id="currentProject">（工事が未選択）</span>
    </div>
    <div class="appbar-actions">
      <button class="btn" id="btnProjects">工事の選択</button>
      <button class="btn" id="btnNewProject">＋ 新規工事</button>
      <button class="btn" id="btnUndo" disabled title="元に戻す（Ctrl+Z）">↶ 戻る</button>
      <button class="btn" id="btnRedo" disabled title="やり直す（Ctrl+Y）">↷ 進む</button>
      <button class="btn" id="btnAlbums">アルバム</button>
      <button class="btn" id="btnExportBook">写真帳を出力</button>
      <button class="btn" id="btnBackup">書き出し</button>
      <button class="btn" id="btnImportZip">取り込み</button>
      <button class="btn" id="btnGithub">GitHub</button>
      <button class="btn" id="btnMobile">📱 スマホで開く</button>
    </div>
  </header>

  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main id="main" class="main"></main>
  </div>

  <!-- 同梱ライブラリ（オフライン動作・classic script） -->
  <script src="lib/exifr.umd.js"></script>
  <script src="lib/jspdf.umd.min.js"></script>
  <script src="lib/exceljs.min.js"></script>
  <script src="lib/jszip.min.js"></script>
  <script src="lib/leaflet.js"></script>
  <script src="lib/qrcode.js"></script>

  <!-- アプリ本体（読み込み順に依存関係あり）。?v= は更新のたび切替えてキャッシュを無効化 -->
  <script src="js/storage.js?v=20260703a"></script>
  <script src="js/ui.js?v=20260703a"></script>
  <script src="js/undo.js?v=20260703a"></script>
  <script src="js/exif.js?v=20260703a"></script>
  <script src="js/map.js?v=20260703a"></script>
  <script src="js/history.js?v=20260703a"></script>
  <script src="js/projects.js?v=20260703a"></script>
  <script src="js/photos.js?v=20260703a"></script>
  <script src="js/albums.js?v=20260703a"></script>
  <script src="js/export-book.js?v=20260703a"></script>
  <script src="js/backup.js?v=20260703a"></script>
  <script src="js/github.js?v=20260703a"></script>
  <script src="js/app.js?v=20260703a"></script>
</body>
</html>
